name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Remove generated artifacts from checkout
        run: rm -rf dist *.vsix

      - name: Package VSIX
        run: npx vsce package --out tree-sitter-vscode-implementation-${{ github.ref_name }}.vsix

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
